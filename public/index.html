<!DOCTYPE html>
<html>
<head>
    <title>Bulk STK Push</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Bulk STK Push Dashboard</h1>

    <input type="number" id="amount" placeholder="Amount">

    <input type="text" id="reference" placeholder="Reference">

    <input type="text" id="description" placeholder="Description">

    <textarea
        id="numbers"
        placeholder="Enter phone numbers, one per line"></textarea>

    <button onclick="sendBulk()">
        Send STK Push
    </button>

    <pre id="output"></pre>

</div>

<script src="app.js"></script>

</body>
</html>
